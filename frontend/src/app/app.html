<div class="flex h-screen bg-stone-50 overflow-hidden font-sans">
 <!-- =======================================================
      SIDEBAR - MODERN LIGHT BEIGE & STONE DESIGN
      ======================================================= -->
  <aside class="w-64 bg-stone-100 border-r border-stone-200 flex flex-col shadow-lg shrink-0 select-none z-10">

    <!-- Logo & Header -->
    <div class="p-6 flex items-center gap-3 border-b border-stone-200">
      <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center text-white shadow-md">
        <!-- SVG Chef Hat Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
          <path d="M6 18V6a4 4 0 0 1 8 0v12" />
          <path d="M18 18V9a4 4 0 0 0-8 0v9" />
          <path d="M3 18h18" />
          <path d="M4 22h16" />
        </svg>
      </div>
      <span class="text-red-600 font-black text-xl tracking-tight italic">Chefcito</span>
    </div>

    <!-- Navigation Tabs -->
    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto no-scrollbar">

      <button (click)="cambiarTab('cocina')" [class]="'w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold transition-all text-left cursor-pointer ' +
      (activeTab === 'cocina'
        ? 'bg-red-600 text-white shadow-lg shadow-red-200/50'
        : 'text-stone-600 hover:bg-stone-200/60 hover:text-stone-900')">
        <span>Cocina</span>

        <span *ngIf="cocinaPendientesCount > 0"
        class="ml-auto bg-amber-500 text-white text-[10px] font-extrabold px-2 py-0.5 rounded-full leading-none shadow-sm animate-fade-in"
        style="border-radius: 9999px;">
          {{ cocinaPendientesCount }}
        </span>
      </button>

      <button (click)="cambiarTab('compras')" [class]="'w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold transition-all text-left cursor-pointer ' +
      (activeTab === 'compras'
        ? 'bg-red-600 text-white shadow-lg shadow-red-200/50'
        : 'text-stone-600 hover:bg-stone-200/60 hover:text-stone-900')">
        <span>Compras de insumos</span>

        <span *ngIf="comprasTieneAlertas"
        class="ml-auto bg-amber-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full leading-none animate-pulse"
        style="border-radius: 9999px; letter-spacing: 0.05em;">
          ALERTAS
        </span>
      </button>

      <button (click)="cambiarTab('punto_venta')" [class]="'w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold transition-all text-left cursor-pointer ' +
      (activeTab === 'punto_venta'
        ? 'bg-red-600 text-white shadow-lg shadow-red-200/50'
        : 'text-stone-600 hover:bg-stone-200/60 hover:text-stone-900')">
        <span>Punto de Venta</span>
      </button>

      <button (click)="cambiarTab('dashboard')" [class]="'w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold transition-all text-left cursor-pointer ' +
      (activeTab === 'dashboard'
        ? 'bg-red-600 text-white shadow-lg shadow-red-200/50'
        : 'text-stone-600 hover:bg-stone-200/60 hover:text-stone-900')">
        <span>Stock & Bitácora</span>
      </button>
      <button (click)="cambiarTab('Turno')" [class]="'w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold transition-all text-left cursor-pointer ' +
      (activeTab === 'Turno'
        ? 'bg-red-600 text-white shadow-lg shadow-red-200/50'
        : 'text-stone-600 hover:bg-stone-200/60 hover:text-stone-900')">
        <span>Turno</span>
      </button>
      <!-- Plano de Mesas Button -->
      <button
        (click)="activeTab = 'plano_mesas'"
        [class]="'w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold transition-all text-left cursor-pointer ' +
          (activeTab === 'plano_mesas'
            ? 'bg-red-600 text-white shadow-lg shadow-red-200/50'
            : 'text-stone-600 hover:bg-stone-200/60 hover:text-stone-900')"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 shrink-0"><rect x="3" y="3" width="18" height="18" rx="2" /><path d="M9 3v18" /><path d="M15 3v18" /><path d="M3 9h18" /><path d="M3 15h18" /></svg>
        <span>Plano de Mesas</span>
      </button>

      <button (click)="activeTab = 'reportes'" [class]="'w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold transition-all text-left cursor-pointer ' +
          (activeTab === 'reportes'
            ? 'bg-red-600 text-white shadow-lg shadow-red-200/50'
            : 'text-stone-600 hover:bg-stone-200/60 hover:text-stone-900')"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 shrink-0"><path d="M3 3v18h18" /><path d="M18 17V9" /><path d="M13 17V5" /><path d="M8 17v-3" /></svg>
        <span>Reportes</span>
      </button>

    </nav>

  </aside>

  <!-- =======================================================
      MAIN PANEL VIEWPORT - CONTAINER FOR DYNAMIC SUB-COMPONENTS
      ======================================================= -->
  <main class="flex-1 flex flex-col h-full overflow-y-auto no-scrollbar">

    <!-- Top banner / navbar -->
    <div class="bg-white border-b border-stone-200 p-4 flex items-center justify-between">
      <h1 class="text-xl font-bold text-gray-800">Panel de Control Principal</h1>
      <span class="text-sm text-gray-400 italic">Bienvenido 👨‍🍳</span>
    </div>

    <!-- Scrollable Component Content Container -->
    <div class="p-8 flex-1">

      <!-- 1. Cocina Tab -->
      <div *ngIf="activeTab === 'cocina'">
        <app-produccion-cocina></app-produccion-cocina>
      </div>

      <!-- 2. Compras Tab -->
      <div *ngIf="activeTab === 'compras'">
        <app-panel-compras></app-panel-compras>
      </div>

      <!-- 3. Punto de Venta Tab -->
      <div *ngIf="activeTab === 'punto_venta'">
        <app-punto-venta></app-punto-venta>
      </div>

      <!-- 4. Dashboard Stock Tab -->
      <div *ngIf="activeTab === 'dashboard'">
        <app-dashboard-stock></app-dashboard-stock>
      </div>

      <!-- 5. Turno Tab -->
      <div *ngIf="activeTab === 'Turno'">
        <app-turno-control></app-turno-control>
      </div>

       <!-- 6. Plano de Mesas Tab -->
      <div *ngIf="activeTab === 'plano_mesas'">
        <app-plano-mesas></app-plano-mesas>
      </div>

      <!-- 7. Reportes Tab -->
      <div *ngIf="activeTab === 'reportes'">
        <app-reportes></app-reportes>
      </div>

    </div>
  </main>
</div>
